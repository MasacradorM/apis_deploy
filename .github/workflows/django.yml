name: Deploy Django API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check secret exists
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_DJANGO }}" ]; then
            echo "❌ ERROR: El secret RENDER_DEPLOY_HOOK_DJANGO no está configurado."
            echo "Ve a tu repositorio → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Trigger Render Deploy (Django)
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DJANGO }}"
          echo "✅ Deploy de Api-Django disparado correctamente"
