name: Deploy Node API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check secret exists
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_NODE }}" ]; then
            echo "❌ ERROR: El secret RENDER_DEPLOY_HOOK_NODE no está configurado."
            echo "Ve a tu repositorio → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Trigger Render Deploy (Node)
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_NODE }}"
          echo "✅ Deploy de Api-Node disparado correctamente"
